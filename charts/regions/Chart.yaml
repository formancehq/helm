apiVersion: v2
name: regions
description: Formance Private Regions Helm Chart
home: "https://github.com/formancehq/helm"
sources:
- "https://github.com/formancehq/helm/tree/main/charts/regions"

maintainers:
- name: "Formance Team"
  email: "support@formance.com"
icon: "https://avatars.githubusercontent.com/u/84325077?s=200&v=4"
annotations:
  formance.com/monorepo-tag-prefix: "regions"

type: application
version: 3.7.4
appVersion: "latest"

dependencies:
- name: agent
  version: 2.X
  repository: "file://../agent"
  condition: agent.enabled
- name: operator
  version: 3.X
  repository: "oci://ghcr.io/formancehq/helm"
  condition: operator.enabled
- name: core
  version: "1.X"
  repository: file://../core
