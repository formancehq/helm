apiVersion: v2
name: formance
description: Formance Platform - Unified Helm Chart
home: "https://formance.com"
sources:
- "https://github.com/formancehq/helm/tree/main/charts/formance"
maintainers:
- name: "Formance Team"
  email: "support@formance.com"
icon: "https://avatars.githubusercontent.com/u/84325077?s=200&v=4"

type: application
version: 1.5.1
appVersion: "latest"
# The "-0" suffix is required for GKE compatibility. GKE versions contain
# build metadata like "v1.33.5-gke.2392000" which semver treats as pre-release.
# Without "-0", Helm rejects these versions as incompatible.
# See: https://codeengineered.com/blog/2022/helm-kubeversion-gke/
kubeVersion: ">=1.14.0-0"

dependencies:
- name: postgresql
  repository: oci://registry-1.docker.io/bitnamicharts
  version: 18.X
  condition: postgresql.enabled
- name: regions
  version: 3.X
  repository: "file://../regions"
  tags:
  - EntrepriseEdition
  - CommunityEdition
  import-values:
  - child: versions
    parent: global.exports.versions
  - child: stacks
    parent: global.exports.stacks
- name: cloudprem
  version: 4.X
  repository: "file://../cloudprem"
  tags:
  - EntrepriseEdition
